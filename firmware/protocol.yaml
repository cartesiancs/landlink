# Landlink protocol — single source of truth.
# Consumed by:
#   firmware/tools/gen_protocol.py  -> src/shared/protocol/opcodes.h, tlv_tags.h
#                                   -> ../src/shared/protocol/landlink.ts, uuids.ts
# Never hand-edit the generated files. Edit this spec and re-run codegen.

version: 1
firmware_name: "landlink"
proto_version: 1

ble:
  # 128-bit custom UUIDs (8-4-4-4-12). Base encodes "LL-landlink-1" in ASCII
  # across the trailing groups; the last 2 bytes discriminate the service
  # and its characteristics.
  service_uuid: "4c4c0001-6c61-6e64-6c69-6e6b2d310001"
  characteristics:
    CMD:   { uuid: "4c4c0002-6c61-6e64-6c69-6e6b2d310001", props: [write] }
    EVT:   { uuid: "4c4c0003-6c61-6e64-6c69-6e6b2d310001", props: [notify] }
    STATE: { uuid: "4c4c0004-6c61-6e64-6c69-6e6b2d310001", props: [read, notify] }
    INFO:  { uuid: "4c4c0005-6c61-6e64-6c69-6e6b2d310001", props: [read] }
    OTA:   { uuid: "4c4c0006-6c61-6e64-6c69-6e6b2d310001", props: [write_no_response] }
    LOG:   { uuid: "4c4c0007-6c61-6e64-6c69-6e6b2d310001", props: [notify] }
  device_name_prefix: "Landlink-"

# FSM states surfaced through STATE characteristic.
fsm_states:
  BOOT:                0x00
  SELF_TEST:           0x01
  UNPROVISIONED:       0x02
  PAIRING:             0x03
  WIFI_PROVISIONING:   0x04
  LORA_PAIRING:        0x05
  READY:               0x06
  OTA:                 0x07
  FACTORY_RESET:       0x08
  FAULT:               0xFF

# BLE opcodes (C = Client/Web, F = Firmware)
opcodes:
  # WiFi onboarding
  WIFI_SCAN:             { code: 0x01, dir: C_TO_F }
  WIFI_SCAN_RESULT:      { code: 0x02, dir: F_TO_C }
  WIFI_CONNECT:          { code: 0x03, dir: C_TO_F }
  WIFI_STATUS:           { code: 0x04, dir: F_TO_C }
  WIFI_GET_STATUS:       { code: 0x05, dir: C_TO_F, note: "Request the current WIFI_STATUS (state/ip/rssi). Lets the client refresh the persisted Wi-Fi state on every (re)connect." }

  # Radio region
  RADIO_GET_REGION:      { code: 0x10, dir: C_TO_F }
  RADIO_SET_REGION:      { code: 0x11, dir: C_TO_F }
  RADIO_REGION_RESULT:   { code: 0x12, dir: F_TO_C }

  # Radio protocol mode (0=Landlink native, 1=Meshtastic-compatible)
  RADIO_GET_PROTOCOL:    { code: 0x13, dir: C_TO_F }
  RADIO_SET_PROTOCOL:    { code: 0x14, dir: C_TO_F }
  RADIO_PROTOCOL_RESULT: { code: 0x15, dir: F_TO_C }

  # Node role for CSMA/CA scheduling (0=client, 1=router, 2=repeater).
  # Router/Repeater nodes skip the client rebroadcast offset, guaranteeing
  # they relay before client-class nodes when both hear the same packet.
  RADIO_GET_ROLE:        { code: 0x16, dir: C_TO_F }
  RADIO_SET_ROLE:        { code: 0x17, dir: C_TO_F }
  RADIO_ROLE_RESULT:     { code: 0x18, dir: F_TO_C }

  # LoRa peer discovery + pairing
  LORA_DISCOVER:         { code: 0x20, dir: C_TO_F }
  LORA_PEER_FOUND:       { code: 0x21, dir: F_TO_C }
  LORA_PAIR:             { code: 0x22, dir: C_TO_F }
  LORA_PAIR_RESULT:      { code: 0x23, dir: F_TO_C }

  # Mesh membership + messaging
  MESH_JOIN:             { code: 0x30, dir: C_TO_F }
  MESH_LEAVE:            { code: 0x31, dir: C_TO_F }
  MESH_SEND:             { code: 0x32, dir: C_TO_F, note: "Optional CHANNEL_INDEX TLV selects the channel (default 0 = Primary)." }
  MESH_RECV:             { code: 0x33, dir: F_TO_C, note: "Always carries CHANNEL_INDEX so the host can demux into the right channel feed." }
  MESH_SEND_RESULT:      { code: 0x34, dir: F_TO_C, note: "Returns assigned pkt_id for a MESH_SEND so the host can track ACKs. Emitted in both Landlink and Meshtastic modes." }

  # Channel management. Channels are (name, PSK) pairs mirroring the Meshtastic
  # channel concept; up to 8 per device (index 0..7). Index 0 = Primary (cannot
  # be deleted). Both Landlink and Meshtastic protocol modes use the same
  # channel registry. CHANNEL_LIST_RESULT streams one EVT per occupied slot.
  CHANNEL_LIST:          { code: 0x35, dir: C_TO_F }
  CHANNEL_LIST_RESULT:   { code: 0x36, dir: F_TO_C, note: "One EVT per occupied slot. PSK always included so the phone can rebuild Meshtastic share URLs across reconnects (the SET path is ungated, so asymmetric readback gating provided no real security)." }
  CHANNEL_SET:           { code: 0x37, dir: C_TO_F, note: "Not gated on authed(); mirrors MESH_JOIN's posture so unprovisioned devices can still receive channel config." }
  CHANNEL_DELETE:        { code: 0x38, dir: C_TO_F }
  CHANNEL_RESULT:        { code: 0x39, dir: F_TO_C, note: "Emitted after SET (carries new slot TLVs) and DELETE (CHANNEL_INDEX only)." }

  # Device telemetry (battery + GPS), pushed periodically while BLE is connected
  DEVICE_TELEMETRY:      { code: 0x70, dir: F_TO_C }

  # Key management
  KEY_ROTATE:            { code: 0x40, dir: C_TO_F }
  KEY_EXPORT:            { code: 0x41, dir: C_TO_F, requires: pairing_state }

  # BLE-level pairing handshake (X25519 + fingerprint confirm)
  PAIR_BEGIN:            { code: 0x48, dir: C_TO_F }
  PAIR_CHALLENGE:        { code: 0x49, dir: F_TO_C }
  PAIR_CONFIRM:          { code: 0x4A, dir: C_TO_F }
  PAIR_RESULT:           { code: 0x4B, dir: F_TO_C }

  # Factory reset (requires pinned session)
  FACTORY_RESET:         { code: 0x50, dir: C_TO_F, requires: authed }

  # OTA
  OTA_BEGIN:             { code: 0x60, dir: C_TO_F, requires: authed }
  OTA_CHUNK:             { code: 0x61, dir: C_TO_F, note: "via OTA characteristic" }
  OTA_COMMIT:            { code: 0x62, dir: C_TO_F, requires: authed }
  OTA_STATUS:            { code: 0x63, dir: F_TO_C }

  # Remote relay onboarding. The phone reads the device's self-generated
  # identity (pubkey + rendezvous id) over the trusted BLE link, enrolls it to
  # the user's anonymous account at the relay, then pushes the relay URL + the
  # account binding so the device can open its own outbound WSS to the relay.
  # Once connected, the relay tunnels opaque BLE frames between phone and device
  # so the exact same wire protocol works remotely.
  REMOTE_GET_IDENTITY:    { code: 0x80, dir: C_TO_F }
  REMOTE_IDENTITY_RESULT: { code: 0x81, dir: F_TO_C, note: "Carries REMOTE_DEVICE_PUBKEY + REMOTE_RENDEZVOUS_ID + REMOTE_DEVICE_ECDH_PUB." }
  REMOTE_SET_CONFIG:     { code: 0x82, dir: C_TO_F, note: "Carries REMOTE_SERVER_URL + REMOTE_ACCOUNT_BIND + REMOTE_ACCOUNT_ECDH_PUB; device begins outbound relay connect." }
  REMOTE_STATUS:         { code: 0x83, dir: F_TO_C, note: "Carries REMOTE_STATE (0=off,1=connecting,2=online,3=error)." }
  REMOTE_COSIGN_ENROLL:  { code: 0x84, dir: C_TO_F, note: "Carries REMOTE_ACCOUNT_BIND (account identity pubkey); device co-signs the enrollment binding." }
  REMOTE_COSIGN_RESULT:  { code: 0x85, dir: F_TO_C, note: "Carries REMOTE_ENROLL_SIG (device signature over the enrollment binding)." }

  # Generic error
  ERROR:                 { code: 0x7F, dir: F_TO_C }

# TLV tag registry — shared between BLE payloads and mesh payloads.
# Tag ranges:
#   0x01-0x0F : kind discriminators + shared meta
#   0x10-0x1F : chat
#   0x20-0x2F : location
#   0x30-0x3F : sensor
#   0x40-0x4F : ack / routing
#   0x50-0x5F : beacon / peer meta
#   0x60-0x6F : ping / traceroute
#   0x70-0x7F : pairing (X25519)
#   0x80-0x8F : BLE WiFi TLVs
#   0x90-0x9F : BLE OTA TLVs
#   0xA0-0xAF : BLE region TLVs
#   0xB0-0xBF : BLE mesh-membership TLVs
#   0xF0-0xFF : error/diagnostics
tlv_tags:
  # Meta
  KIND:                  { tag: 0x01, type: u8,   desc: "Payload kind discriminator" }
  # Context-sensitive identity. In MESH_RECV / LORA_PEER_FOUND /
  # DEVICE_TELEMETRY the NODE_ID is the originator (sender). In MESH_SEND it
  # is the unicast destination, and its presence promotes the outbound frame
  # from broadcast to unicast (firmware sets FlagUnicast and Meshtastic
  # MeshPacket.to=dst). Absence keeps the default broadcast behaviour.
  # On MESH_RECV the dst is reported separately via NODE_DST below so the
  # host can demux unicast DMs from channel broadcasts. Always 4 bytes, LE u32.
  NODE_ID:               { tag: 0x02, type: u32,  desc: "32-bit node id (sender in RX, destination in MESH_SEND)" }
  # Destination of a received frame. 0xFFFFFFFF means broadcast on the
  # channel; any other value means the frame was unicast to that node id.
  # Emitted by mesh_chat on every MESH_RECV so the host can route DMs to a
  # peer-keyed thread instead of the channel feed. Always 4 bytes, LE u32.
  NODE_DST:              { tag: 0x05, type: u32,  desc: "Destination u32 in MESH_RECV; 0xFFFFFFFF means broadcast." }
  MESH_ID:               { tag: 0x03, type: u16,  desc: "Mesh group id" }
  TIMESTAMP_MS:          { tag: 0x04, type: u64,  desc: "Unix time ms (best-effort)" }

  # Chat
  CHAT_TEXT:             { tag: 0x10, type: utf8, desc: "UTF-8 chat text, <=200 B" }
  CHAT_REPLY_TO:         { tag: 0x11, type: u32,  desc: "pkt_id being replied to" }
  CHAT_PKI_ENCRYPTED:    { tag: 0x12, type: u8,   desc: "1 if the originating LoRa frame was Meshtastic PKI-encrypted (DM)" }

  # Location
  LAT_E7:                { tag: 0x20, type: i32,  desc: "Latitude * 1e7" }
  LON_E7:                { tag: 0x21, type: i32,  desc: "Longitude * 1e7" }
  ALT_M:                 { tag: 0x22, type: i16,  desc: "Altitude meters" }
  HDOP:                  { tag: 0x23, type: u8,   desc: "HDOP * 10" }
  SPEED_KMH:             { tag: 0x24, type: u16,  desc: "Speed km/h * 10" }

  # Sensor
  BATTERY_MV:            { tag: 0x30, type: u16,  desc: "Battery voltage mV" }
  BATTERY_PCT:           { tag: 0x31, type: u8,   desc: "Battery %" }
  TEMP_C_E1:             { tag: 0x32, type: i16,  desc: "Temp C * 10" }
  RSSI_DBM:              { tag: 0x33, type: i8,   desc: "Last RX RSSI dBm" }
  SNR_DB_E1:             { tag: 0x34, type: i8,   desc: "Last RX SNR dB * 10" }
  CHARGE_STATE:          { tag: 0x35, type: u8,   desc: "bit0 VBUS, bit1 CHARGING, bit2 FULL, bit3 BATT_PRESENT" }

  # Routing / ack
  ACK_PKT_ID:            { tag: 0x40, type: u32 }
  HOP_LIMIT:             { tag: 0x41, type: u8 }
  RETRY_PKT_ID:          { tag: 0x42, type: u32, desc: "Landlink-only: on MESH_SEND, reuse this pkt_id instead of allocating a new one (chat retry)" }

  # Beacon / peer meta
  NODE_NAME:             { tag: 0x50, type: utf8, desc: "Human-friendly peer name <=32 B" }
  CAP_FLAGS:             { tag: 0x51, type: u16,  desc: "Capability bitfield" }

  # Pairing (X25519)
  PUBKEY_X25519:         { tag: 0x70, type: bytes32 }
  NONCE16:               { tag: 0x71, type: bytes16 }
  FINGERPRINT4:          { tag: 0x72, type: bytes4 }

  # BLE WiFi
  WIFI_SSID:             { tag: 0x80, type: utf8 }
  WIFI_PSK:              { tag: 0x81, type: utf8 }
  WIFI_RSSI:             { tag: 0x82, type: i8 }
  WIFI_AUTH:             { tag: 0x83, type: u8 }
  WIFI_IP:               { tag: 0x84, type: bytes4 }
  WIFI_STATE:            { tag: 0x85, type: u8 }

  # BLE OTA
  OTA_SIZE:              { tag: 0x90, type: u32 }
  OTA_SHA256:            { tag: 0x91, type: bytes32 }
  OTA_SIG_ED25519:       { tag: 0x92, type: bytes64 }
  OTA_CHUNK_SEQ:         { tag: 0x93, type: u32 }
  OTA_CHUNK_CRC32:       { tag: 0x94, type: u32 }
  OTA_PROGRESS_PCT:      { tag: 0x95, type: u8 }

  # BLE region
  REGION:                { tag: 0xA0, type: u8 }
  PROTOCOL:              { tag: 0xA1, type: u8, desc: "Active radio protocol: 0=Landlink, 1=Meshtastic" }
  ROLE:                  { tag: 0xA2, type: u8, desc: "Node CSMA/CA role: 0=client, 1=router, 2=repeater" }

  # BLE mesh membership
  MESH_KEY:              { tag: 0xB0, type: bytes32 }
  MESH_SALT:             { tag: 0xB1, type: bytes8 }

  # Channels
  CHANNEL_INDEX:         { tag: 0xC0, type: u8,    desc: "Channel index 0..7" }
  CHANNEL_NAME:          { tag: 0xC1, type: utf8,  desc: "Channel name, <=12 B (Meshtastic cap)" }
  CHANNEL_PSK:           { tag: 0xC2, type: bytes, desc: "Pre-shared key, 1/16/32 B (Meshtastic PSK rules)" }
  CHANNEL_ROLE:          { tag: 0xC3, type: u8,    desc: "0=primary, 1=secondary, 2=disabled" }

  # Remote relay (0xD0-0xDF)
  REMOTE_SERVER_URL:     { tag: 0xD0, type: utf8,  desc: "Relay WSS base URL the device dials out to" }
  REMOTE_DEVICE_PUBKEY:  { tag: 0xD1, type: bytes, desc: "Device ECDSA P-256 public key (raw/uncompressed)" }
  REMOTE_RENDEZVOUS_ID:  { tag: 0xD2, type: bytes, desc: "Opaque rendezvous id the relay routes frames by" }
  REMOTE_ACCOUNT_BIND:   { tag: 0xD3, type: bytes, desc: "Account binding blob provisioned by the phone (server-verified)" }
  REMOTE_STATE:          { tag: 0xD4, type: u8,    desc: "0=off, 1=connecting, 2=online, 3=error" }
  REMOTE_ENROLL_SIG:      { tag: 0xD5, type: bytes, desc: "Device ECDSA P-256 signature (raw r||s, 64 B) over the enrollment binding" }
  REMOTE_ACCOUNT_ECDH_PUB: { tag: 0xD6, type: bytes, desc: "Account ECDH P-256 public key (raw uncompressed, 65 B) for E2E key agreement" }
  REMOTE_DEVICE_ECDH_PUB: { tag: 0xD7, type: bytes, desc: "Device ECDH P-256 public key (raw uncompressed, 65 B) for E2E key agreement" }

  # Errors
  ERR_CODE:              { tag: 0xF0, type: u8 }
  ERR_CONTEXT:           { tag: 0xF1, type: utf8 }

# Mesh payload kinds (values of the KIND TLV).
mesh_kinds:
  CHAT_TEXT:             0x01
  LOC_PING:              0x02
  SENSOR_SAMPLE:         0x03
  ACK:                   0x04
  BEACON:                0x05
  PAIR_REQ:              0x06
  PAIR_RESP:             0x07
  PAIR_CONFIRM:          0x08
  PING:                  0x09
  TRACEROUTE:            0x0A

# Radio regions (values of the REGION TLV / persisted in NVS).
regions:
  KR923:                 0x00
  EU868:                 0x01
  US915:                 0x02

# Generic error codes (value of ERR_CODE TLV)
errors:
  OK:                    0x00
  BAD_ARG:               0x01
  BAD_STATE:             0x02
  UNAUTHED:              0x03
  NOT_FOUND:             0x04
  BUSY:                  0x05
  TIMEOUT:               0x06
  CRYPTO_FAIL:           0x07
  STORAGE_FAIL:          0x08
  INTERNAL:              0xFF
