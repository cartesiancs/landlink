; Landlink Module I firmware
; Targets:
;   ttgo-t-beam-sx1262           LILYGO T-Beam V1.1 + SX1262, 923 MHz
;   xiao-esp32s3-wio-sx1262      Seeed XIAO ESP32S3 + Wio-SX1262 kit for Meshtastic
;
; Board selection is compile-time. The capability differences (no PMU/GPS,
; LED polarity, HW rev string, Meshtastic HardwareModel enum) flow from
; src/shared/config/board.h, which dispatches on a LL_BOARD_<name> macro
; injected here as a build flag.

[platformio]
default_envs = ttgo-t-beam-sx1262

; ===========================================================================
; Shared base. Everything except platform pin, board, and the LL_BOARD_* flag.
; ===========================================================================
[base]
framework = arduino
monitor_speed = 115200
upload_speed = 115200

board_build.partitions = partitions.csv
board_build.embed_files = keys/ota_pubkey.bin

lib_deps =
    ; Pin RadioLib to the exact commit that stock Meshtastic firmware ships.
    ; 6.6.0 has subtle SX1262 PHY differences (PA config / modulation-param
    ; write ordering) that leave Landlink mutually-incompatible on the air
    ; with stock Meshtastic. Two Landlinks on the same RadioLib happen to
    ; hear each other but neither group hears stock Meshtastic.
    https://github.com/jgromes/RadioLib/archive/afe72ae46a343e15e3cac7f26ac585c7f98bffe5.zip
    h2zero/NimBLE-Arduino @ ^1.4.1
    lewisxhe/XPowersLib @ ^0.2.4
    mikalhart/TinyGPSPlus @ ^1.1.0
    ; Remote-relay WebSocket client (ws:// and wss://).
    links2004/WebSockets @ ^2.4.1

build_unflags =
    -std=gnu++11

build_src_flags =
    -std=gnu++17

base_build_flags =
    -DLL_FW_VERSION=\"0.1.0\"
    -DLL_PROTO_VERSION=1
    -DCONFIG_BT_NIMBLE_MAX_CONNECTIONS=2
    ; WHY: CHANNEL_SET on the PKI-enabled build (HKDF + AES-CCM stacked on
    ; the existing channel-recompute + 4x NVS persist path) overruns the
    ; 4 KB default NimBLE host task stack and trips the canary on core 0
    ; (nimble_host). Bump to 8 KB. Costs 4 KB of RAM, fine on both boards.
    -DCONFIG_BT_NIMBLE_HOST_TASK_STACK_SIZE=8192
    -DRADIOLIB_STATIC_ONLY=1
    -Os
    -Werror=return-type
    -Wall
    -Wextra
    -I src

; ===========================================================================
; LILYGO T-Beam V1.1 + SX1262 (current production target)
; ===========================================================================
[env:ttgo-t-beam-sx1262]
extends = base
platform = espressif32@^6.7.0
board = ttgo-t-beam
build_flags =
    ${base.base_build_flags}
    -DLL_BOARD_TBEAM_V11

; ===========================================================================
; Seeed XIAO ESP32S3 + Wio-SX1262 Kit for Meshtastic
; ===========================================================================
[env:xiao-esp32s3-wio-sx1262]
extends = base
platform = espressif32@^6.7.0
board = seeed_xiao_esp32s3
build_flags =
    ${base.base_build_flags}
    -DLL_BOARD_XIAO_WIO_SX1262

; ===========================================================================
; Off-target tests for TLV/crypto/codec logic
; ===========================================================================
[env:native-test]
platform = native
test_framework = unity
build_flags =
    -std=gnu++17
    -DLL_NATIVE_TEST=1
    -I src
