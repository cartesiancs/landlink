; Landlink Module I firmware
; Target: LILYGO T-Beam V1.1 with SX1262 (923 MHz)
; Framework: Arduino (with ESP-IDF for OTA/NVS/mbedtls)

[platformio]
default_envs = ttgo-t-beam-sx1262

[env:ttgo-t-beam-sx1262]
platform = espressif32@^6.7.0
board = ttgo-t-beam
framework = arduino
monitor_speed = 115200
upload_speed = 115200

board_build.partitions = partitions.csv
board_build.embed_files = keys/ota_pubkey.bin

lib_deps =
    ; Pin RadioLib to the exact commit that stock Meshtastic firmware ships.
    ; 6.6.0 has subtle SX1262 PHY differences (PA config / modulation-param
    ; write ordering) that leave Landlink mutually-incompatible on the air
    ; with stock Meshtastic — even though every register-level value we set
    ; matches the spec. Two Landlinks on the same RadioLib happen to hear
    ; each other but neither group hears the other.
    https://github.com/jgromes/RadioLib/archive/afe72ae46a343e15e3cac7f26ac585c7f98bffe5.zip
    h2zero/NimBLE-Arduino @ ^1.4.1
    lewisxhe/XPowersLib @ ^0.2.4
    mikalhart/TinyGPSPlus @ ^1.1.0

build_flags =
    -DLL_FW_VERSION=\"0.1.0\"
    -DLL_PROTO_VERSION=1
    -DCONFIG_BT_NIMBLE_MAX_CONNECTIONS=2
    -DRADIOLIB_STATIC_ONLY=1
    -Os
    -Werror=return-type
    -Wall
    -Wextra
    -I src

build_unflags =
    -std=gnu++11

build_src_flags =
    -std=gnu++17

; Off-target tests for TLV/crypto/codec logic
[env:native-test]
platform = native
test_framework = unity
build_flags =
    -std=gnu++17
    -DLL_NATIVE_TEST=1
    -I src
