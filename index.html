<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)" />
    <link rel="icon" href="/favicon.ico" />
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('vision-theme');
          var resolved = stored === 'dark' ? 'dark' : 'light';
          var color = resolved === 'dark' ? '#000000' : '#ffffff';
          var root = document.documentElement;
          if (resolved === 'dark') root.classList.add('dark');
          root.style.colorScheme = resolved;
          var metas = document.querySelectorAll('meta[name="theme-color"]');
          for (var i = 0; i < metas.length; i++) metas[i].setAttribute('content', color);
        } catch (e) {}
      })();
    </script>
    <link rel="canonical" href="http://landlink.sh/" />

    <title>Landlink | A drone-powered alternative to Starlink</title>
    <meta
      name="description"
      content="Landlink is a drone-powered connectivity platform. Replace satellite dependence with an autonomous mesh network that reaches up to 50km from a single ground station. no accounts, local-first, you stay in control."
    />
    <meta
      name="keywords"
      content="Landlink, Starlink alternative, drone mesh network, ground station, Web Bluetooth, off-grid internet, private connectivity, cartesiancs"
    />
    <meta name="author" content="cartesiancs" />
    <meta name="copyright" content="© 2026 cartesiancs" />
    <meta name="robots" content="index, follow" />

    <meta property="og:type" content="website" />

      property="og:description"

    />
